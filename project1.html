<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Chatbot Ultra Pro</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
    <h1>AI Chatbot Ultra Pro</h1>
    <p>Advanced conversational AI (No API)</p>
</div>

<div class="container">

    <div class="card">

        <div id="chatBox" class="chat-box"></div>

        <div class="input-area">
            <input id="input" type="text" placeholder="Type a message...">
            <button onclick="send()">Send</button>
            <button onclick="clearChat()">Clear</button>
        </div>

    </div>

    <div class="card">
        <a href="index.html" class="btn">Back Home</a>
    </div>

</div>

<script>

let chatBox = document.getElementById("chatBox");

let userName = localStorage.getItem("username") || "";
let history = JSON.parse(localStorage.getItem("chat_history")) || [];

/* LOAD OLD CHAT */
window.onload = () => {
    history.forEach(m => renderMessage(m.sender, m.text));
};

/* SEND MESSAGE */
function send(){

let input = document.getElementById("input");
let text = input.value.trim();
if(text === "") return;

renderMessage("user", text);
save("user", text);

let msg = text.toLowerCase();
let reply = "";

/* MEMORY */
if(msg.includes("my name is")){
    userName = text.split("is")[1].trim();
    localStorage.setItem("username", userName);
    reply = "Nice to meet you " + userName + " 😊";
}

/* GREETING */
else if(msg.includes("hello") || msg.includes("hi")){
    reply = userName ? "Hello " + userName + " 👋" : "Hello 👋 What is your name?";
}

/* HOW ARE YOU */
else if(msg.includes("how are you")){
    reply = "I'm doing great 😊 How about you?";
}

/* HELP */
else if(msg.includes("help")){
    reply = "I can chat, remember your name, tell jokes, and answer basic questions 🤖";
}

/* JOKE */
else if(msg.includes("joke")){
    reply = "Why do programmers hate nature? Too many bugs 🐛😂";
}

/* PYTHON */
else if(msg.includes("python")){
    reply = "Python is powerful for AI, data science and automation 🐍";
}

/* AI */
else if(msg.includes("ai")){
    reply = "AI means Artificial Intelligence 🤖 It simulates human thinking.";
}

/* BYE */
else if(msg.includes("bye")){
    reply = "Goodbye 👋 have a nice day " + (userName || "");
}

/* DEFAULT SMART RESPONSE */
else{
    let responses = [
        "Interesting 🤔 tell me more",
        "I'm still learning 😅",
        "Nice 👍",
        "Can you explain more?"
    ];
    reply = responses[Math.floor(Math.random()*responses.length)];
}

/* typing effect */
showTyping(() => {
    renderMessage("bot", reply);
    save("bot", reply);
});

input.value = "";
}

/* RENDER MESSAGE */
function renderMessage(sender, text){

let div = document.createElement("div");
div.className = sender;

div.innerHTML = sender === "user"
? "You: " + text
: "Bot: " + text;

chatBox.appendChild(div);
chatBox.scrollTop = chatBox.scrollHeight;

}

/* SAVE CHAT */
function save(sender, text){
history.push({sender, text});
localStorage.setItem("chat_history", JSON.stringify(history));
}

/* CLEAR CHAT */
function clearChat(){
localStorage.removeItem("chat_history");
chatBox.innerHTML = "";
history = [];
}

/* TYPING EFFECT */
function showTyping(callback){

let typing = document.createElement("div");
typing.className = "bot";
typing.innerHTML = "Bot is typing...";
chatBox.appendChild(typing);
chatBox.scrollTop = chatBox.scrollHeight;

setTimeout(()=>{
typing.remove();
callback();
},800);

}

</script>

</body>
</html>
