<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>

<style>
body{
    background:#0b0b0d;
    color:#f5f5f5;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.chat-box{
    width:350px;
    height:500px;
    background:#151515;
    border:1px solid #2a2a2a;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.header{
    background:#111;
    padding:15px;
    text-align:center;
    color:#f5d06f;
    font-weight:bold;
}

.messages{
    flex:1;
    padding:10px;
    overflow-y:auto;
}

.msg{
    padding:8px 10px;
    margin:5px 0;
    border-radius:8px;
    max-width:80%;
}

.user{
    background:#f5d06f;
    color:#111;
    align-self:flex-end;
}

.bot{
    background:#2a2a2a;
    color:#fff;
    align-self:flex-start;
}

.input-box{
    display:flex;
    border-top:1px solid #2a2a2a;
}

input{
    flex:1;
    padding:10px;
    border:none;
    outline:none;
    background:#111;
    color:#fff;
}

button{
    background:#f5d06f;
    border:none;
    padding:10px 15px;
    cursor:pointer;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="chat-box">

    <div class="header">AI Chatbot</div>

    <div id="messages" class="messages"></div>

    <div class="input-box">
        <input id="input" placeholder="Type a message...">
        <button onclick="sendMsg()">Send</button>
    </div>

</div>

<script>
function sendMsg(){

    let input = document.getElementById("input");
    let text = input.value.trim();

    if(text === "") return;

    addMessage(text, "user");

    setTimeout(()=>{
        addMessage(getResponse(text), "bot");
    },500);

    input.value = "";
}

function addMessage(text, type){

    let msg = document.createElement("div");
    msg.classList.add("msg", type);
    msg.innerText = text;

    document.getElementById("messages").appendChild(msg);
    document.getElementById("messages").scrollTop = 999999;
}

function getResponse(text){

text = text.toLowerCase();

if(text.includes("hello"))
    return "Hello! Nice to meet you.";

if(text.includes("hi"))
    return "Hi there!";

if(text.includes("how are you"))
    return "I'm doing great!";

if(text.includes("what is your name"))
    return "My name is AI Chatbot.";

if(text.includes("who are you"))
    return "I am an AI chatbot.";

if(text.includes("python"))
    return "Python is a powerful programming language.";

if(text.includes("html"))
    return "HTML builds the structure of websites.";

if(text.includes("css"))
    return "CSS styles websites.";

if(text.includes("javascript"))
    return "JavaScript adds interactivity.";

if(text.includes("ai"))
    return "AI stands for Artificial Intelligence.";

if(text.includes("joke"))
    return "Why do programmers hate nature? Too many bugs.";

if(text.includes("bye"))
    return "Goodbye!";

return "I don't understand. Can you explain differently?";
}
</script>

</body>
</html>
