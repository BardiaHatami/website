<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz Pro</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
    <h1>Quiz Challenge</h1>
    <p>Test your knowledge</p>
</div>

<div class="container">

<!-- START SCREEN -->
<div class="card" id="startBox">
    <h2>Ready?</h2>
    <p>10 questions • No time limit pressure</p>
    <button class="btn" onclick="startQuiz()">Start Quiz</button>
</div>

<!-- QUIZ BOX -->
<div class="card" id="quizBox" style="display:none;">

    <div id="progress"></div>

    <h2 id="question"></h2>

    <div id="answers"></div>

</div>

<!-- RESULT -->
<div class="card" id="resultBox" style="display:none;">
    <h2>Quiz Finished 🎉</h2>
    <p id="scoreText"></p>
    <button class="btn" onclick="restart()">Restart</button>
    <a class="btn" href="index.html">Home</a>
</div>

</div>

<script>

const questions = [
{
q:"What does HTML stand for?",
a:["Hyper Text Markup Language","High Text Machine Language","Home Tool Markup Language","None"],
c:0
},
{
q:"Which is best for AI?",
a:["CSS","Python","HTML","Photoshop"],
c:1
},
{
q:"JavaScript is used for?",
a:["Styling","Logic","Database","AI only"],
c:1
},
{
q:"CSS means?",
a:["Creative Style System","Cascading Style Sheets","Computer Style Syntax","None"],
c:1
},
{
q:"Who created this portfolio?",
a:["Bardia","Google","Microsoft","Apple"],
c:0
}
];

let index = 0;
let score = 0;

function startQuiz(){
document.getElementById("startBox").style.display="none";
document.getElementById("quizBox").style.display="block";
loadQuestion();
}

function loadQuestion(){

let q = questions[index];

document.getElementById("question").textContent = q.q;

document.getElementById("progress").textContent =
"Question " + (index+1) + " / " + questions.length;

let answersDiv = document.getElementById("answers");
answersDiv.innerHTML = "";

q.a.forEach((ans,i)=>{

let btn = document.createElement("button");
btn.className = "btn";
btn.style.display="block";
btn.style.margin="10px 0";
btn.textContent = ans;

btn.onclick = ()=>checkAnswer(i);

answersDiv.appendChild(btn);

});

}

function checkAnswer(i){

if(i === questions[index].c){
score++;
}

index++;

if(index < questions.length){
loadQuestion();
}else{
showResult();
}

}

function showResult(){

document.getElementById("quizBox").style.display="none";
document.getElementById("resultBox").style.display="block";

document.getElementById("scoreText").textContent =
"Your Score: " + score + " / " + questions.length;

}

function restart(){
location.reload();
}

</script>

</body>
</html>
