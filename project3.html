<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Planner</title>

<style>
body{
    background:#0b0b0d;
    color:#f5f5f5;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.app{
    width:360px;
    background:#151515;
    border:1px solid #2a2a2a;
    border-radius:12px;
    padding:15px;
}

h2{
    text-align:center;
    color:#f5d06f;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#111;
    border:none;
    color:#fff;
    outline:none;
    border-radius:8px;
}

button{
    width:100%;
    margin-top:10px;
    padding:10px;
    background:#f5d06f;
    border:none;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
}

.task{
    background:#1a1a1a;
    margin-top:10px;
    padding:10px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border:1px solid #2a2a2a;
}

.task.done{
    text-decoration:line-through;
    opacity:0.6;
}

.delete{
    color:red;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="app">

    <h2>Study Planner</h2>

    <input id="taskInput" placeholder="Enter task...">
    <button onclick="addTask()">Add Task</button>

    <div id="taskList"></div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function render(){

    let list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((t,i)=>{

        let div = document.createElement("div");
        div.className = "task " + (t.done ? "done" : "");

        div.innerHTML = `
            <span onclick="toggle(${i})">${t.text}</span>
            <span class="delete" onclick="removeTask(${i})">X</span>
        `;

        list.appendChild(div);
    });

    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask(){

    let input = document.getElementById("taskInput");

    if(input.value.trim() === "") return;

    tasks.push({text:input.value, done:false});

    input.value = "";
    render();
}

function toggle(i){
    tasks[i].done = !tasks[i].done;
    render();
}

function removeTask(i){
    tasks.splice(i,1);
    render();
}

render();

</script>

</body>
</html>
